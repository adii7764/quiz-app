<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result — QuizIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">
  <div class="card result-center">
    <h2 class="page-title">Quiz Complete! 🎯</h2>

    <!-- SVG Ring -->
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7c6aff"/>
            <stop offset="100%" style="stop-color:#ff6b9d"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="70" cy="70" r="54"/>
        <circle class="ring-fill" id="ring" cx="70" cy="70" r="54"/>
      </svg>
      <div class="score-text">
        <span class="score-pct" id="pct-text">0%</span>
        <span class="score-label">score</span>
      </div>
    </div>

    <p class="score-fraction">{{ score }} / {{ total }} correct</p>
    <div id="feedback-badge" class="feedback-badge"></div>

    <div class="btn-group mt-3">
      <a href="/leaderboard" class="btn btn-outline">🏆 Leaderboard</a>
      <a href="/dashboard" class="btn btn-primary">Dashboard →</a>
    </div>
  </div>
</div>

<script>
const target = {{ percentage }};
const ring = document.getElementById('ring');
const circumference = 2 * Math.PI * 54; // 339.29
let count = 0;

const interval = setInterval(() => {
  count = Math.min(count + 1, target);
  document.getElementById('pct-text').textContent = count + '%';
  ring.style.strokeDashoffset = circumference * (1 - count / 100);
  if (count >= target) {
    clearInterval(interval);
    const fb = document.getElementById('feedback-badge');
    if (target >= 80) {
      fb.textContent = '🔥 Excellent work!';
      fb.className = 'feedback-badge fb-excellent';
    } else if (target >= 50) {
      fb.textContent = '👍 Good job!';
      fb.className = 'feedback-badge fb-good';
    } else {
      fb.textContent = '😅 Keep practicing!';
      fb.className = 'feedback-badge fb-practice';
    }
  }
}, 15);
</script>
</body>
</html>
