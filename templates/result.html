<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Your Score 🎯</h2>

        <p style="font-size: 20px;"><b>{{ score }} / {{ total }}</b></p>

        <p style="font-size: 18px; color: #667eea;">

        </p>

        <br>

        <a href="/dashboard">
            <button>Back to Dashboard</button>
        </a>
    </div>
</div>

</body>
</html>
