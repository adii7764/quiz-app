<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — QuizIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <span class="brand-name">QuizIQ</span>
    </div>

    <h2 class="page-title">Create account</h2>
    <p class="page-subtitle">Join and start quizzing</p>

    {% if error %}
    <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Pick a username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
      </div>
      <div class="mt-2">
        <button type="submit" class="btn btn-primary">Create Account →</button>
      </div>
    </form>

    <p class="auth-footer">Already have an account? <a href="/">Sign in</a></p>
  </div>
</div>
</body>
</html>
