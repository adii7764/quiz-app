<!DOCTYPE html>
<html>
<head>
    <title>All Quizzes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h2>All Generated Quizzes 📊</h2>

{% for q in quizzes %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">

    <!-- VIEW BUTTON -->
    <a href="/admin/quiz/{{ q[0] }}">
        <button>🔑 {{ q[0] }}</button>
    </a>

    <!-- DELETE BUTTON -->
    <button onclick="openDeleteModal('{{ q[0] }}')" style="background:red;">
        Delete ❌
    </button>

</div>
{% endfor %}

<!-- HIDDEN FORM -->
<form id="deleteForm" method="POST" style="display:none;"></form>

<br><br>
<a href="/dashboard">
    <button>⬅ Back to Dashboard</button>
</a>

</div>
</div>

<!-- 🔥 DELETE MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Quiz ❗</h3>
        <p>Are you sure you want to delete this quiz?</p>

        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="confirmDeleteBtn" style="background:red;">Delete</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- 🔥 JS -->
<script>
let deleteCode = null;

function openDeleteModal(code) {
    deleteCode = code;
    document.getElementById("deleteModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("deleteModal").style.display = "none";
}

document.getElementById("confirmDeleteBtn").onclick = function() {
    if (deleteCode) {
        let form = document.getElementById("deleteForm");
        form.action = "/admin/delete_quiz/" + deleteCode;
        form.submit();
    }
};
</script>

</body>
</html>
