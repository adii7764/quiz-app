<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Welcome, {{ user }} 🎉</h2>

        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">

            <!-- JOIN QUIZ -->
            <a href="/join">
                <button>Join Quiz 🔑</button>
            </a>

            <!-- LEADERBOARD -->
            <a href="/leaderboard">
                <button>Leaderboard 🏆</button>
            </a>

            <!-- HISTORY -->
            <a href="/history">
                <button>My History 📜</button>
            </a>

            <!-- ADMIN ONLY -->
            {% if user == 'admin' %}
            <a href="/admin">
                <button>Generate Quiz 👑</button>
            </a>
            <a href="/admin/quizzes">
                <button>View Quizzes 📊</button>
            </a>
            {% endif %}

            <!-- LOGOUT -->
            <a href="/logout">
                <button>Logout 🚪</button>
            </a>

        </div>

    </div>
</div>

</body>
</html>
