<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — QuizIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">
  <div class="card">
    <div class="dash-header">
      <p class="dash-welcome">Good to see you,</p>
      <h2 class="dash-name">{{ user }} 👋</h2>
    </div>

    <div class="dash-grid">
      <a href="/join" class="dash-item">
        <div class="dash-item-icon icon-quiz">🔑</div>
        <div class="dash-item-text">
          <strong>Join Quiz</strong>
          <span>Enter a quiz code</span>
        </div>
      </a>

      <a href="/leaderboard" class="dash-item">
        <div class="dash-item-icon icon-board">🏆</div>
        <div class="dash-item-text">
          <strong>Leaderboard</strong>
          <span>Top players</span>
        </div>
      </a>

      <a href="/create" class="dash-item">
        <div class="dash-item-icon icon-admin">✏️</div>
        <div class="dash-item-text">
          <strong>Create Quiz</strong>
          <span>Build & share a quiz</span>
        </div>
      </a>

      <a href="/my-quizzes" class="dash-item">
        <div class="dash-item-icon icon-view">📊</div>
        <div class="dash-item-text">
          <strong>My Quizzes</strong>
          <span>View your quizzes</span>
        </div>
      </a>

      <a href="/history" class="dash-item full-width">
        <div class="dash-item-icon icon-history">📜</div>
        <div class="dash-item-text">
          <strong>My History</strong>
          <span>View past attempts</span>
        </div>
      </a>
    </div>

    <hr class="divider">

    <a href="/logout" class="btn btn-outline" style="display:flex;align-items:center;justify-content:center;gap:8px;">
      🚪 Sign Out
    </a>
  </div>
</div>
</body>
</html>
