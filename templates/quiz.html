<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — QuizIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">
  <div class="card card-wide">

    <!-- Header -->
    <div class="quiz-header">
      <div class="quiz-progress">
        Question <strong id="q-cur">1</strong> of <strong>{{ questions|length }}</strong>
      </div>
      <div class="timer-wrap">
        <span class="timer-icon">⏱</span>
        <span id="timer-val">60</span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: {{ (1/questions|length*100)|round }}%"></div>
    </div>

    <!-- Form -->
    <form method="POST" action="/result" id="quizForm">
      <input type="hidden" name="code" value="{{ code }}">

      {% for ques in questions %}
      <div class="question-block {% if loop.first %}active{% endif %}" id="qblock-{{ loop.index0 }}">
        <p class="question-num">Question {{ loop.index }}</p>
        <p class="question-text">{{ ques['question'] }}</p>

        <div class="options">
          {% set letters = ['A','B','C','D'] %}
          {% set opts = [ques['option1'], ques['option2'], ques['option3'], ques['option4']] %}
          {% for i in range(4) %}
          <label class="option-label">
            <input type="radio" name="q{{ ques['id'] }}" value="{{ opts[i] }}">
            <div class="option-marker">{{ letters[i] }}</div>
            <span>{{ opts[i] }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      {% endfor %}

      <!-- Navigation -->
      <div class="quiz-nav">
        <button type="button" class="btn btn-outline" onclick="prevQ()" id="btn-prev" style="display:none">← Prev</button>
        <button type="button" class="btn btn-primary" onclick="nextQ()" id="btn-next">Next →</button>
        <button type="submit" class="btn btn-primary" id="btn-submit" style="display:none">Submit Quiz ✓</button>
      </div>
    </form>
  </div>
</div>

<script>
const total = {{ questions|length }};
let cur = 0;
let timeLeft = 60;
let timerEl = document.getElementById('timer-val');
let timerHandle;
const fill = document.getElementById('progress-fill');

function showQ(i) {
  document.querySelectorAll('.question-block').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });
  document.getElementById('q-cur').textContent = i + 1;
  fill.style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('btn-prev').style.display = i > 0 ? '' : 'none';
  const isLast = i === total - 1;
  document.getElementById('btn-next').style.display = isLast ? 'none' : '';
  document.getElementById('btn-submit').style.display = isLast ? '' : 'none';
  resetTimer();
}

function nextQ() {
  if (cur < total - 1) { cur++; showQ(cur); }
}

function prevQ() {
  if (cur > 0) { cur--; showQ(cur); }
}

function resetTimer() {
  clearInterval(timerHandle);
  timeLeft = 60;
  timerEl.textContent = timeLeft;
  timerEl.classList.remove('warning');
  timerHandle = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 10) timerEl.classList.add('warning');
    if (timeLeft <= 0) {
      clearInterval(timerHandle);
      if (cur < total - 1) { cur++; showQ(cur); }
      else document.getElementById('quizForm').submit();
    }
  }, 1000);
}

showQ(0);
</script>
</body>
</html>
