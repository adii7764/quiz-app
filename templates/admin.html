<!DOCTYPE html>
<html>
<head>
    <title>Generate Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h2>Generate Quiz 👑</h2>

<!-- 🔥 ADMIN STATS -->
<div style="display:flex; gap:20px; margin-top:10px;">

    <!-- LEFT -->
    <div style="flex:1;">
        <p><b>Total Quizzes:</b> {{ total }}</p>
    </div>

    <!-- RIGHT -->
    <div style="flex:1;">
        <p><b>Quiz Codes:</b></p>

        <div style="max-height:120px; overflow:auto;">
            {% for code in codes %}
                <p>🔑 {{ code[0] }}</p>
            {% endfor %}
        </div>
    </div>

</div>

<hr>

<p>Questions: <span id="count">1</span> (Min 2 - Max 50)</p>

<form id="quizForm">

    <input type="text" id="question" placeholder="Question" required>
    <input type="text" id="option1" placeholder="Option 1" required>
    <input type="text" id="option2" placeholder="Option 2" required>
    <input type="text" id="option3" placeholder="Option 3" required>
    <input type="text" id="option4" placeholder="Option 4" required>
    <input type="text" id="answer" placeholder="Correct Answer" required>

    <br><br>

    <div style="display:flex; gap:10px;">
        <button type="button" onclick="prev()">⬅ Previous</button>
        <button type="button" onclick="addQuestion()">➕ Add</button>
        <button type="button" onclick="next()">Next ➡</button>
    </div>

    <br>

    <button type="submit">🚀 Generate Quiz Code</button>

</form>

<br>

<a href="/dashboard"><button>Back</button></a>

</div>
</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup-overlay" style="display:none;">
    <div class="popup-box">
        <h3>Quiz Code Generated 🎉</h3>

        <input type="text" id="quizCode" readonly>

        <button onclick="copyCode()">Copy Code 📋</button>
        <button onclick="closePopup()">Close ❌</button>
    </div>
</div>

<script>
let questions = [];
let index = 0;

function saveCurrent() {
    let q = {
        question: document.getElementById("question").value,
        o1: document.getElementById("option1").value,
        o2: document.getElementById("option2").value,
        o3: document.getElementById("option3").value,
        o4: document.getElementById("option4").value,
        ans: document.getElementById("answer").value
    };

    questions[index] = q;
}

function loadQuestion(i) {
    let q = questions[i] || {};

    document.getElementById("question").value = q.question || "";
    document.getElementById("option1").value = q.o1 || "";
    document.getElementById("option2").value = q.o2 || "";
    document.getElementById("option3").value = q.o3 || "";
    document.getElementById("option4").value = q.o4 || "";
    document.getElementById("answer").value = q.ans || "";

    document.getElementById("count").innerText = i + 1;
}

function addQuestion() {
    saveCurrent();

    if (questions.length >= 50) {
        alert("Max 50 questions allowed ❌");
        return;
    }

    index++;
    loadQuestion(index);
}

function next() {
    saveCurrent();
    if (index < questions.length - 1) {
        index++;
        loadQuestion(index);
    }
}

function prev() {
    saveCurrent();
    if (index > 0) {
        index--;
        loadQuestion(index);
    }
}

document.getElementById("quizForm").addEventListener("submit", function(e) {
    e.preventDefault();

    saveCurrent();

    if (questions.length < 2) {
        alert("Minimum 2 questions required ❌");
        return;
    }

    fetch('/admin_generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ questions: questions })
    })
    .then(res => res.text())
    .then(data => {
        let code = data.split(":")[1].trim().split(" ")[0];

        document.getElementById("quizCode").value = code;
        document.getElementById("popup").style.display = "flex";
    });
});

function copyCode() {
    let code = document.getElementById("quizCode");
    code.select();
    document.execCommand("copy");
    alert("Copied ✅");
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    window.location.reload();
}
</script>

</body>
</html>
