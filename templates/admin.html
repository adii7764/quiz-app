<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Quiz — QuizIQ Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page page-wide">
  <div class="card card-xl">
    <div class="page-bar">
      <div>
        <h2 class="page-title">Create Quiz 👑</h2>
        <p class="text-muted">Build a quiz for your players</p>
      </div>
      <a href="/dashboard" class="btn btn-outline btn-sm">← Dashboard</a>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">{{ total }}</div>
        <div class="stat-label">Total Quizzes</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="q-total-count">1</div>
        <div class="stat-label">Questions Added</div>
      </div>
    </div>

    <form id="quizForm">
      <div class="builder-header">
        <div class="q-counter">Q <span id="q-idx">1</span></div>
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn btn-outline btn-sm" onclick="prev()">← Prev</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="addQuestion()">+ Add</button>
          <button type="button" class="btn btn-outline btn-sm" onclick="next()">Next →</button>
        </div>
      </div>

      <div class="field">
        <label>Question</label>
        <input type="text" id="question" placeholder="Type your question here…" required>
      </div>

      <div class="options-grid">
        <div class="field">
          <label>Option A</label>
          <input type="text" id="option1" placeholder="Option A">
        </div>
        <div class="field">
          <label>Option B</label>
          <input type="text" id="option2" placeholder="Option B">
        </div>
        <div class="field">
          <label>Option C</label>
          <input type="text" id="option3" placeholder="Option C">
        </div>
        <div class="field">
          <label>Option D</label>
          <input type="text" id="option4" placeholder="Option D">
        </div>
      </div>

      <div class="field">
        <label>Correct Answer (exact text)</label>
        <input type="text" id="answer" placeholder="Must match one of the options above">
      </div>

      <button type="submit" class="btn btn-primary mt-2">🚀 Generate Quiz Code</button>
    </form>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div style="font-size:40px;margin-bottom:8px;">🎉</div>
    <h3>Quiz Created!</h3>
    <p>Share this code with your players</p>
    <div class="modal-code" id="modal-code"></div>
    <button class="btn btn-primary" onclick="copyCode()">📋 Copy Code</button>
    <button class="btn btn-outline mt-1" onclick="closeModal()">Done</button>
  </div>
</div>

<script>
let questions = [];
let index = 0;
const fields = ['question','option1','option2','option3','option4','answer'];
const keys   = ['question','o1','o2','o3','o4','ans'];

function save() {
  questions[index] = {};
  fields.forEach((f,i) => questions[index][keys[i]] = document.getElementById(f).value);
}

function load(i) {
  const q = questions[i] || {};
  fields.forEach((f,j) => document.getElementById(f).value = q[keys[j]] || '');
  document.getElementById('q-idx').textContent = i + 1;
  document.getElementById('q-total-count').textContent = Math.max(questions.length, i + 1);
}

function addQuestion() {
  save();
  if (questions.length >= 50) { alert('Max 50 questions'); return; }
  index = questions.length;
  load(index);
}

function next() {
  save();
  if (index < questions.length - 1) { index++; load(index); }
}

function prev() {
  save();
  if (index > 0) { index--; load(index); }
}

document.getElementById('quizForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  save();
  const valid = questions.filter(q => q.question && q.o1 && q.o2 && q.o3 && q.o4 && q.ans);
  if (valid.length < 2) { alert('Add at least 2 complete questions'); return; }

  const res = await fetch('/admin_generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({questions: valid})
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('modal-code').textContent = data.code;
    document.getElementById('modal').classList.add('open');
    // reset
    questions = [];
    index = 0;
    load(0);
  } else {
    alert(data.message);
  }
});

function copyCode() {
  navigator.clipboard.writeText(document.getElementById('modal-code').textContent);
  document.querySelector('#modal .btn-primary').textContent = '✓ Copied!';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.querySelector('#modal .btn-primary').textContent = '📋 Copy Code';
}
</script>
</body>
</html>
